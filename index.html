<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>しりとりスコアアタック</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#111;
  color:#fff;
  font-family:sans-serif;
}

#app{
  height:100dvh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

input{
  font-size:20px;
  padding:10px;
}
</style>
</head>

<body>
<div id="app">
  <div id="score">0</div>
  <input id="inp" placeholder="ことば入力" />
</div>

<script>
const TURN_MS = 3000;

let G = {
  active:true,
  submitting:false,
  timerStart:Date.now(),
  score:0,
  lastChar:""
};

let LOCAL_DICT = new Set();
let CACHE = new Map(); // ←追加（最強）

// --------------------
// 辞書ロード
// --------------------
fetch("words.txt")
.then(r=>r.text())
.then(t=>{
  LOCAL_DICT = new Set(t.split("\n"));
});

// --------------------
// 辞書チェック（最適化）
// --------------------
async function checkWord(word){

  // キャッシュ
  if(CACHE.has(word)) return CACHE.get(word);

  // ローカル
  if(LOCAL_DICT.has(word)){
    CACHE.set(word,true);
    return true;
  }

  // 外部（非同期で裏チェック）
  checkExternal(word);

  CACHE.set(word,false);
  return false;
}

// 外部辞書（裏でだけ使う）
async function checkExternal(word){
  try{
    const res = await fetch(
      "https://ja.wiktionary.org/w/api.php?action=query&titles="+word+"&format=json&origin=*"
    );
    const json = await res.json();

    const exists = Object.values(json.query.pages)[0].missing === undefined;

    if(exists){
      CACHE.set(word,true);
    }

  }catch(e){}
}

// --------------------
// タイマー
// --------------------
function loop(){
  if(!G.active) return;

  const e = Date.now() - G.timerStart;

  if(e >= TURN_MS){
    if(G.submitting) return; // ←フリーズ防止

    endGame();
    return;
  }

  requestAnimationFrame(loop);
}
loop();

// --------------------
// submit
// --------------------
const inp = document.getElementById("inp");

inp.addEventListener("keydown", async (e)=>{
  if(e.key !== "Enter") return;

  if(!G.active || G.submitting) return;

  G.submitting = true; // ←先に

  const word = inp.value.trim();
  inp.value = "";
  inp.disabled = true;

  try{

    const ok = await checkWord(word);

    if(!G.active) return;

    if(!ok){
      alert("存在しない！");
      return;
    }

    // スコア（長さ＋ギリギリボーナス）
    const elapsed = Date.now() - G.timerStart;
    const timeBonus = Math.max(0, (TURN_MS - elapsed));

    const add = word.length * 10 + Math.floor(timeBonus/10);

    G.score += add;
    document.getElementById("score").innerText = G.score;

    // 次ターン
    G.timerStart = Date.now();

  } finally {
    inp.disabled = false;
    G.submitting = false;
    inp.focus();
  }
});

// --------------------
// 終了
// --------------------
function endGame(){
  G.active = false;

  setTimeout(()=>{
    const text =
`【しりとりスコアアタック】
🔥 ${G.score}点

これ超えられる？`;

    const url =
"https://twitter.com/intent/tweet?text=" + encodeURIComponent(text);

    window.open(url);
  },300);
}

</script>
</body>
</html>
