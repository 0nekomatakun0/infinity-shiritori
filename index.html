<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>しりとりスコアアタック</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#111;
  color:#fff;
  font-family:sans-serif;
}

/* モバイル修正 */
#app{
  height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

#score{
  font-size:32px;
  margin-bottom:20px;
}

input{
  font-size:20px;
  padding:10px;
}
</style>
</head>

<body>
<div id="app">
  <div id="score">0</div>
  <input id="inp" placeholder="ことば入力" />
</div>

<script>
const TURN_MS = 3000;

let G = {
  active:true,
  submitting:false,
  timerStart:Date.now(),
  score:0,
  chain:0
};

// 辞書
let LOCAL_DICT = new Set();
const WORD_CACHE = new Map();

// 読み込み
fetch("words.txt")
.then(r=>r.text())
.then(t=>{
  LOCAL_DICT = new Set(t.split("\n"));
});

// ----------------
// 辞書チェック（最適化版）
// ----------------
async function checkDict(word){

  if(WORD_CACHE.has(word)){
    return WORD_CACHE.get(word);
  }

  if(LOCAL_DICT.has(word)){
    WORD_CACHE.set(word,true);
    return true;
  }

  // 外部チェックは待たない
  checkExternal(word);

  WORD_CACHE.set(word,false);
  return false;
}

async function checkExternal(word){
  try{
    const res = await fetch(
      "https://ja.wiktionary.org/w/api.php?action=query&titles="+word+"&format=json&origin=*"
    );
    const json = await res.json();
    const exists = Object.values(json.query.pages)[0].missing === undefined;

    if(exists){
      WORD_CACHE.set(word,true);
    }
  }catch(e){}
}

// ----------------
// タイマー
// ----------------
function loop(){
  if(!G.active) return;

  const e = Date.now() - G.timerStart;

  if(e >= TURN_MS){
    if(G.submitting) return; // フリーズ防止
    endGame();
    return;
  }

  requestAnimationFrame(loop);
}
loop();

// ----------------
// エフェクト
// ----------------
function showEffect(text){
  const el = document.createElement("div");
  el.innerText = text;
  el.style.position = "fixed";
  el.style.top = "40%";
  el.style.left = "50%";
  el.style.transform = "translate(-50%,-50%)";
  el.style.fontSize = "28px";
  el.style.opacity = "1";
  el.style.transition = "0.5s";

  document.body.appendChild(el);

  setTimeout(()=>{ el.style.opacity = "0"; },50);
  setTimeout(()=>{ el.remove(); },500);
}

// ----------------
// 入力
// ----------------
const inp = document.getElementById("inp");

inp.addEventListener("focus", () => {
  setTimeout(()=>window.scrollTo(0,0),100);
});

inp.addEventListener("keydown", async (e)=>{
  if(e.key !== "Enter") return;

  if(!G.active || G.submitting) return;

  G.submitting = true; // ←先に（重要）

  const word = inp.value.trim();
  inp.value = "";
  inp.disabled = true;

  try{
    const elapsed = Date.now() - G.timerStart;

    const ok = await checkDict(word);

    if(!G.active) return;

    if(!ok){
      alert("存在しない！");
      G.chain = 0;
      return;
    }

    // スコア
    const remain = TURN_MS - elapsed;

    const lenBonus = word.length * 10;
    const timeBonus = Math.floor(remain/10);

    G.chain++;
    const chainBonus = G.chain * 2;

    const add = lenBonus + timeBonus + chainBonus;

    G.score += add;

    document.getElementById("score").innerText = G.score;

    // ギリギリ演出
    if(remain < 300){
      showEffect("神回避🔥");
    } else if(remain < 800){
      showEffect("あぶねぇ！");
    }

    G.timerStart = Date.now();

  } finally {
    inp.disabled = false;
    G.submitting = false;
    inp.focus();
  }
});

// ----------------
// 終了（バズ仕様）
// ----------------
function endGame(){
  G.active = false;

  const text =
`【しりとりスコアアタック】
🔥 ${G.score}点 / ${G.chain}連鎖

ギリギリ耐えたｗ
これ超えられる？`;

  const url =
"https://twitter.com/intent/tweet?text=" + encodeURIComponent(text);

  setTimeout(()=>{
    window.open(url);
  },300);
}

</script>
</body>
</html>
